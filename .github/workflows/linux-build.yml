name: Linux build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Dusk Studio (GCC Release, Ubuntu 22.04, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      # fail-fast: false so arm64 failures don't kill the amd64 build (or
      # vice versa). Pi users + amd64 users are two distinct audiences;
      # one regressing shouldn't deny the other their CI artifact.
      fail-fast: false
      matrix:
        include:
          # amd64 — primary desktop Linux. Existing behaviour.
          - arch: amd64
            runner: ubuntu-22.04
          # arm64 — Raspberry Pi 4 / 5 + Apple-silicon Linux VMs.
          # GitHub's ubuntu-22.04-arm runner has been GA on public
          # repos since 2025-01. Same Ubuntu image as amd64 so the
          # apt package set + JUCE patches mostly carry over; the
          # SIMD<long long> alias patch is x86-SSE-only and no-ops
          # on arm64 (the awk script's match-then-insert is a soft
          # gate; arm64 build doesn't compile juce_SIMDNativeOps_sse).
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v4
        with:
          # external/sfizz is a submodule; the test binary compiles
          # DuskMultisampleProcessor.cpp (#include <sfizz.h>), so it must
          # be present or the build fails with "sfizz.h: No such file".
          submodules: recursive
          persist-credentials: false

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libxss-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev xvfb \
            libwayland-dev libxkbcommon-dev libdecor-0-dev

      - name: Clone JUCE 8.0.4 (upstream)
        # CI uses upstream JUCE. The plugdata-team wayland-juce8 fork
        # carries 5 local commits (XEmbed mapping, SIMD<int64> alias,
        # Wayland peer-creation latch, etc.) that exist only on the dev
        # box — not pushable. The runtime-only fixes (XEmbed, Wayland
        # peer) don't matter for CI; the SIMD<long long> alias does
        # because GCC on x86_64 instantiates SIMDRegister<long long>
        # for jmax<juce::int64>(). Patch it in below.
        # JuceCompat.h picks the right addDefaultFormats API via the
        # DUSKSTUDIO_JUCE_HAS_FREE_ADD_FORMATS preprocessor define (CMake
        # detects which surface is present at configure time).
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git \
            "${RUNNER_TEMP}/JUCE-wayland"

      - name: Patch JUCE — SIMDNativeOps<long long> alias for x86_64 Linux
        # Upstream JUCE 8.0.4's juce_SIMDNativeOps_sse.h defines
        # SIMDNativeOps<int64_t> but not SIMDNativeOps<long long>. On
        # GCC x86_64 those are distinct types (long long is 64-bit;
        # int64_t is the same width but a different name) and JUCE's
        # template machinery instantiates SIMDRegister<long long> for
        # any jmax<juce::int64>() call — incomplete type, hard error.
        # The plugdata-team JUCE-wayland fork adds these two aliases;
        # we apply them here so upstream JUCE builds cleanly.
        run: |
          file="${RUNNER_TEMP}/JUCE-wayland/modules/juce_dsp/native/juce_SIMDNativeOps_sse.h"
          # Tolerant match: a closing brace then a // comment mentioning
          # both "juce" and "dsp" — survives upstream whitespace / comment
          # rewording that an exact-string match would silently miss.
          awk '
            /^}[[:space:]]*\/\/.*juce.*dsp/ && !done {
              print "#if defined (__GNUC__) && defined (__SIZEOF_LONG__) && __SIZEOF_LONG__ == 8 && !defined (_WIN32)"
              print "template <> struct SIMDNativeOps<long long> : SIMDNativeOps<int64_t> {};"
              print "template <> struct SIMDNativeOps<unsigned long long> : SIMDNativeOps<uint64_t> {};"
              print "#endif"
              done = 1
            }
            { print }
          ' "$file" > "$file.new" && mv "$file.new" "$file"
          echo "Patched: $file"
          # Fail fast: a missing alias means upstream moved the anchor and
          # the patch no-op'd. Catching it here beats a cryptic incomplete-
          # type compile error 10 minutes into the build.
          if ! grep -q "SIMDNativeOps<long long>" "$file"; then
            echo "ERROR: SIMDNativeOps<long long> alias not present after patch — the awk anchor likely no longer matches upstream JUCE." >&2
            exit 1
          fi

      - name: Clone Dusk plugins (donor DSP)
        run: |
          git clone --depth 1 \
            https://github.com/dusk-audio/dusk-audio-plugins.git \
            "${RUNNER_TEMP}/plugins-main"

      - name: Configure (Release)
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_SKIP_FORK_CHECK=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE-wayland" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"

      - name: Build (Release)
        run: cmake --build build-linux -j

      - name: Smoke launch (xvfb, --version)
        # Verifies the binary actually links + starts. --version exits
        # cleanly without bringing up the GUI; xvfb covers the headless
        # JUCE init that still touches X11 even for the early-exit path.
        run: |
          xvfb-run --auto-servernum \
            build-linux/DuskStudio_artefacts/Release/DuskStudio --version

      - name: Headless self-test (xvfb, DUSKSTUDIO_RUN_SELFTEST=1)
        # --version exits before primeRealtimeAudio + crash_handler +
        # the rest of initialise. DUSKSTUDIO_RUN_SELFTEST drives the
        # AudioPipelineSelfTest path: full AudioEngine construction,
        # plugin scan attempt, prepareForSelfTest, synthetic DSP. Catches
        # link / startup regressions that --version alone can't see.
        # 60 s timeout because CI runners have no audio device, so the
        # 5 s device-readiness wait in runHeadlessSelfTest will time
        # out before falling through to the synthetic tests.
        run: |
          timeout 60 xvfb-run --auto-servernum \
            env DUSKSTUDIO_RUN_SELFTEST=1 \
            build-linux/DuskStudio_artefacts/Release/DuskStudio

      # Artifact upload intentionally removed: Dusk Studio's binaries are
      # paid + the source is open. CI proves the build compiles + tests
      # pass, but doesn't hand out free downloadable binaries. Release
      # builds happen out of band on a signing-equipped runner.

  tests:
    name: Catch2 tests (GCC Release, Ubuntu 22.04)
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v4
        with:
          # external/sfizz is a submodule; the test binary compiles
          # DuskMultisampleProcessor.cpp (#include <sfizz.h>), so it must
          # be present or the build fails with "sfizz.h: No such file".
          submodules: recursive
          persist-credentials: false

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libxss-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libwayland-dev libxkbcommon-dev libdecor-0-dev

      - name: Clone JUCE 8.0.4 (upstream)
        # See build-job rationale above. Same upstream + same SIMD patch.
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git \
            "${RUNNER_TEMP}/JUCE-wayland"

      - name: Patch JUCE — SIMDNativeOps<long long> alias for x86_64 Linux
        run: |
          file="${RUNNER_TEMP}/JUCE-wayland/modules/juce_dsp/native/juce_SIMDNativeOps_sse.h"
          awk '
            /^}[[:space:]]*\/\/.*juce.*dsp/ && !done {
              print "#if defined (__GNUC__) && defined (__SIZEOF_LONG__) && __SIZEOF_LONG__ == 8 && !defined (_WIN32)"
              print "template <> struct SIMDNativeOps<long long> : SIMDNativeOps<int64_t> {};"
              print "template <> struct SIMDNativeOps<unsigned long long> : SIMDNativeOps<uint64_t> {};"
              print "#endif"
              done = 1
            }
            { print }
          ' "$file" > "$file.new" && mv "$file.new" "$file"
          if ! grep -q "SIMDNativeOps<long long>" "$file"; then
            echo "ERROR: SIMDNativeOps<long long> alias not present after patch — the awk anchor likely no longer matches upstream JUCE." >&2
            exit 1
          fi

      - name: Clone Dusk plugins (donor DSP)
        run: |
          git clone --depth 1 \
            https://github.com/dusk-audio/dusk-audio-plugins.git \
            "${RUNNER_TEMP}/plugins-main"

      - name: Configure tests
        run: |
          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_BUILD_TESTS=ON \
            -DDUSKSTUDIO_SKIP_FORK_CHECK=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE-wayland" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"

      - name: Build tests
        run: cmake --build build-tests --target dusk-studio-tests -j

      - name: Run tests
        run: ctest --test-dir build-tests --output-on-failure
