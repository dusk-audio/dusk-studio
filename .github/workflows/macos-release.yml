name: macOS release (unsigned DMG)

# Builds an UNSIGNED macOS DMG and publishes it to the PRIVATE releases
# repo on a v* tag. Dusk Studio is distributed unsigned by design — no
# Apple Developer ID, no notarization. The .app is only ad-hoc signed
# (codesign -s -, which is free) because Apple Silicon refuses to launch
# an entirely unsigned binary; end users still bypass Gatekeeper on first
# launch (right-click -> Open). The source is open; the packaged binary
# is the product.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   RELEASES_REPO_TOKEN  PAT (fine-grained or classic) with contents:write
#                        on the PRIVATE releases repo below. The DMG is
#                        pushed there as a release asset — NEVER to this
#                        public repo, where artifacts are world-downloadable.
#
# Edit RELEASES_REPO (env, below) to your private releases repo.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build + package unsigned DMG (macOS arm64 Release)
    runs-on: macos-14
    env:
      # Your PRIVATE releases repo. The DMG is pushed here, never to this
      # public repo. Change to your owner/repo.
      RELEASES_REPO: dusk-audio/dusk-studio-releases
      # ccache obj cache (auto-detected by CMakeLists.txt). Stable dir for
      # the actions/cache key below — release builds reuse the same cache.
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Dusk Studio (with sfizz submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Release pushes via the RELEASES_REPO_TOKEN PAT, not the
          # persisted GITHUB_TOKEN — don't leave it in git config.
          persist-credentials: false

      - name: Install ninja + ccache
        run: brew install ninja ccache

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-macos-release-${{ github.sha }}
          restore-keys: |
            ccache-macos-release-

      - name: Clone JUCE 8.0.4 (upstream)
        # Same upstream JUCE the Linux CI uses. No SIMD<long long> patch
        # needed here: that bug is x86_64-GCC-specific (SSE header); this
        # runner is arm64 / clang (NEON header) and compiles clean.
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git \
            "${RUNNER_TEMP}/JUCE"

      - name: Clone Dusk plugins (donor DSP)
        run: |
          git clone --depth 1 \
            https://github.com/dusk-audio/dusk-audio-plugins.git \
            "${RUNNER_TEMP}/plugins-main"

      - name: Configure (Release)
        run: |
          # Ad-hoc codesign identity "-" — free, and required for the .app
          # (plus the bundled dusk-studio-plugin-host helper) to launch on
          # Apple Silicon. No Developer ID, no Hardened Runtime, no notary.
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main" \
            -DDUSKSTUDIO_CODESIGN_IDENTITY="-"

      - name: Build (Release)
        run: cmake --build build -j

      - name: Build + run tests (release gate)
        # No DMG ships unless the full Catch2 suite passes.
        run: |
          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_BUILD_TESTS=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"
          cmake --build build-tests --target dusk-studio-tests -j
          ctest --test-dir build-tests --output-on-failure

      - name: Package unsigned DMG
        # CMake already ad-hoc-signed the .app via identity "-"; just wrap
        # it in a DMG. Not notarized, so users right-click -> Open once.
        run: |
          set -euo pipefail
          ( cd build && cpack -G DragNDrop -C Release )
          shopt -s nullglob
          dmgs=(build/*.dmg)
          DMG="${dmgs[0]:-}"
          [[ -n "$DMG" ]] || { echo "::error::cpack produced no .dmg" >&2; exit 1; }
          base="$(basename "$DMG" .dmg)"
          mv "$DMG" "./${base}.dmg"
          shasum -a 256 "${base}.dmg" | tee SHA256SUMS.macos
          echo "Unsigned DMG: ${base}.dmg"

      - name: Publish DMG to the PRIVATE releases repo
        # Only on a real v* tag. Manual dispatches are build validation —
        # publishing on each would pollute the releases repo.
        # NOT actions/upload-artifact: on a public repo those are
        # world-downloadable, which would give the paid build away. Push
        # to the private releases repo (shares the tag's release with the
        # Windows MSI + Linux tarball; distinct asset names coexist).
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES="Unsigned macOS build. Right-click the app -> Open to bypass Gatekeeper on first launch."

          shopt -s nullglob
          ASSETS=( *.dmg SHA256SUMS.macos )
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::no DMG produced — packaging step failed" >&2
            exit 1
          fi

          # Create the release on first push of this tag, else add the
          # assets (idempotent re-run). --clobber overwrites a same-named
          # asset from a previous attempt.
          if ! gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$RELEASES_REPO" \
              --title "Dusk Studio $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          else
            gh release upload "$TAG" --repo "$RELEASES_REPO" --clobber "${ASSETS[@]}"
          fi
          echo "Published ${#ASSETS[@]} asset(s) to ${RELEASES_REPO} @ ${TAG}"
