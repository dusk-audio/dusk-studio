name: Raspberry Pi build (arm64)

# Build-check for Raspberry Pi 4 / 5 (64-bit) and other aarch64 Linux. Runs on
# GitHub's native ARM64 runner — no cross-compile, no QEMU. Compiles Dusk
# Studio, then smoke-launches the binary and drives the headless self-test so a
# link/startup regression specific to arm64 is caught early. No artifact is
# published (binaries are paid; the source is open).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Dusk Studio (GCC Release, Ubuntu 22.04, arm64)
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v7
        with:
          # external/sfizz is a submodule; DuskMultisampleProcessor.cpp pulls
          # <sfizz.h>, so it must be present or configure/build fails.
          submodules: recursive
          persist-credentials: false

      - name: Install Linux build deps
        # ports.ubuntu.com (the arm64 archive) is under-resourced and regularly
        # unreachable from GitHub's ARM runners on both IPv6 and IPv4, redding
        # the build on an otherwise-clean commit. Swap it for a high-bandwidth
        # mirror (MIT), force IPv4, and retry so a mirror hiccup doesn't fail CI.
        run: |
          sudo find /etc/apt/ -type f \( -name "*.list" -o -name "*.sources" \) \
            -exec sed -i 's|ports.ubuntu.com|mirrors.mit.edu|g' {} +
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4 >/dev/null
          ok=0
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config \
              libasound2-dev libjack-jackd2-dev libmp3lame-dev \
              ladspa-sdk \
              libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
              libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
              libxinerama-dev libxrandr-dev libxrender-dev libxss-dev \
              libwebkit2gtk-4.0-dev libglu1-mesa-dev xvfb \
              libwayland-dev libxkbcommon-dev libdecor-0-dev && { ok=1; break; }
            echo "apt attempt $i failed; retrying in 20s"; sleep 20
          done
          [ "$ok" = 1 ] || { echo "apt failed after 3 attempts"; exit 1; }

      - name: Clone JUCE (Dusk-owned Wayland mirror, pinned)
        # Same pinned Dusk-owned mirror snapshot as linux-build.yml. The
        # snapshot carries the SIMDNativeOps<long long> alias on the SSE header
        # but NOT the NEON one, so arm64 (which compiles the NEON variant) must
        # patch it in: GCC instantiates SIMDRegister<long long> for
        # jmax<juce::int64>(), and int64_t is a distinct type from long long —
        # an incomplete-type hard error without the alias. Applied only when
        # absent, so a future snapshot that already ships the NEON alias makes
        # this a no-op (double-defining the specialisation would fail to
        # compile). Keep JUCE_TAG / JUCE_REV in lockstep with the other Linux
        # workflows.
        env:
          JUCE_MIRROR: https://github.com/dusk-audio/JUCE-wayland.git
          JUCE_TAG: dusk-wayland-v2
          JUCE_REV: 4d85afa175a45e0b5da11f9211de3ba88705588e
        run: |
          set -euo pipefail
          git init -q "${RUNNER_TEMP}/JUCE-wayland"
          cd "${RUNNER_TEMP}/JUCE-wayland"
          git remote add origin "${JUCE_MIRROR}"
          git fetch --depth 1 origin "refs/tags/${JUCE_TAG}"
          git checkout -q FETCH_HEAD
          [[ "$(git rev-parse HEAD)" == "${JUCE_REV}" ]] || {
            echo "ERROR: JUCE checkout $(git rev-parse HEAD) != pinned ${JUCE_REV}" >&2; exit 1; }
          neon="modules/juce_dsp/native/juce_SIMDNativeOps_neon.h"
          if ! grep -q "SIMDNativeOps<long long>" "$neon"; then
            awk '
              /^}[[:space:]]*\/\/.*juce.*dsp/ && !done {
                print "#if defined (__GNUC__) && defined (__SIZEOF_LONG__) && __SIZEOF_LONG__ == 8 && !defined (_WIN32)"
                print "template <> struct SIMDNativeOps<long long> : SIMDNativeOps<int64_t> {};"
                print "template <> struct SIMDNativeOps<unsigned long long> : SIMDNativeOps<uint64_t> {};"
                print "#endif"
                done = 1
              }
              { print }
            ' "$neon" > "$neon.new" && mv "$neon.new" "$neon"
            grep -q "SIMDNativeOps<long long>" "$neon" || {
              echo "ERROR: NEON SIMDNativeOps<long long> alias still missing after patch (awk anchor no longer matches the mirror header)." >&2; exit 1; }
          fi

      - name: Clone Dusk plugins (donor DSP, pinned)
        # Pinned donor SHA (mirrors linux-release.yml). main consumes source
        # files the donor's main HEAD has since relocated, so an unpinned
        # clone breaks configure. Bump every workflow's DONOR_REV together.
        env:
          DONOR_REPO: https://github.com/dusk-audio/dusk-audio-plugins.git
          DONOR_REV: 69f04318e3b7063e382c80ac1cde2388170e668b
        run: |
          set -euo pipefail
          git init -q "${RUNNER_TEMP}/plugins-main"
          cd "${RUNNER_TEMP}/plugins-main"
          git remote add origin "${DONOR_REPO}"
          git fetch --depth 1 origin "${DONOR_REV}"
          git checkout -q "${DONOR_REV}"
          [[ "$(git rev-parse HEAD)" == "${DONOR_REV}" ]] || {
            echo "ERROR: donor checkout $(git rev-parse HEAD) != pinned ${DONOR_REV}" >&2; exit 1; }

      - name: Configure (Release)
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_SKIP_FORK_CHECK=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE-wayland" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"

      - name: Build (Release)
        run: cmake --build build-linux -j

      - name: Smoke launch (xvfb, --version)
        run: |
          xvfb-run --auto-servernum \
            build-linux/DuskStudio_artefacts/Release/DuskStudio --version

      - name: Headless self-test (xvfb, DUSKSTUDIO_RUN_SELFTEST=1)
        # 60 s timeout: CI runners have no audio device, so the device-readiness
        # wait times out before falling through to the synthetic DSP tests.
        run: |
          timeout 60 xvfb-run --auto-servernum \
            env DUSKSTUDIO_RUN_SELFTEST=1 \
            build-linux/DuskStudio_artefacts/Release/DuskStudio
