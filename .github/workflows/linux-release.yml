name: Linux release (tarball)

# Builds the x86_64 portable tarball and publishes it to the PRIVATE releases
# repo on a v* tag — sharing the tag's release with the Windows MSI + macOS DMG
# (distinct asset names coexist). The tarball is UNSIGNED; the source is open,
# the packaged binary is the product. It runs in place or installs via the
# bundled install.sh.
#
# Mirrors linux-build.yml's toolchain (upstream JUCE 8.0.4 + the GCC
# SIMD<long long> alias patch + donor plugins), then runs the same
# scripts/package-tarball.sh a maintainer runs locally.
#
# Required repository secret:
#   RELEASES_REPO_TOKEN  PAT with contents:write on the PRIVATE releases
#                        repo below. The tarball is pushed there as a
#                        release asset — NEVER to this public repo.
#
# Edit RELEASES_REPO (env, below) to your private releases repo.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build + package tarball (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      # Don't cancel the working amd64 build if arm64 fails to compile; a broken
      # Pi build should show red on its own, not block the x86_64 release.
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            label: GCC Release, Ubuntu 22.04, amd64
          - arch: aarch64
            runner: ubuntu-22.04-arm
            label: GCC Release, Ubuntu 22.04, arm64 (Raspberry Pi)
    env:
      RELEASES_REPO: dusk-audio/dusk-studio-releases

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Preflight - releases-repo token is valid (tag builds only)
        # Fail fast BEFORE the ~17-minute build if RELEASES_REPO_TOKEN is dead.
        # A v0.12.0 run once burned a full green build then hit HTTP 401 at the
        # publish step (expired token), and the `|| echo raced` fallback masked
        # it as a benign race. Probe the token up front so an expired/revoked
        # secret stops the run in seconds. Mirrors the publish step's tag guard.
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh api "repos/${RELEASES_REPO}" >/dev/null; then
            echo "::error::RELEASES_REPO_TOKEN cannot access ${RELEASES_REPO} (expired, revoked, or missing contents scope). Rotate the RELEASES_REPO_TOKEN secret with contents:write on that repo, then re-run this workflow." >&2
            exit 1
          fi

      - name: Verify tag matches VERSION
        # Assets are named from the VERSION file, not the tag — a mismatch
        # would publish wrongly-labelled artifacts silently.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          [[ "v$(tr -d '[:space:]' < VERSION)" == "${GITHUB_REF_NAME}" ]] || {
            echo "Tag ${GITHUB_REF_NAME} != VERSION v$(tr -d '[:space:]' < VERSION)"; exit 1; }

      - name: Install Linux build deps + packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libjack-jackd2-dev libmp3lame-dev libsndfile1-dev \
            ladspa-sdk \
            libcurl4-openssl-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libxss-dev \
            libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libwayland-dev libxkbcommon-dev libdecor-0-dev \
            imagemagick xz-utils

      - name: Clone JUCE (Dusk-owned Wayland mirror, pinned)
        # Linux ships against the Wayland fork, NOT upstream: it carries the
        # XEmbed mapping / X11-on-Wayland / peer-creation-latch commits that
        # plugin-editor hosting on Wayland depends on, plus the
        # SIMDNativeOps<long long> alias GCC needs for int64 SIMD (so no
        # separate patch step — re-applying it would duplicate the
        # specialization and fail to compile).
        #
        # Pinned to a Dusk-OWNED mirror (dusk-audio/JUCE-wayland), NOT the
        # upstream plugdata-team fork: that fork rebased + GC'd the exact commit
        # we pinned (b970a99), which broke the release. The mirror is a tree-only
        # snapshot of that known-good state under an immutable tag, so releases
        # can't be broken by a third-party fork's history rewrite. To bump JUCE,
        # push a new snapshot tag to the mirror and update JUCE_TAG / JUCE_REV.
        # Mac + Windows stay on upstream.
        env:
          JUCE_MIRROR: https://github.com/dusk-audio/JUCE-wayland.git
          JUCE_TAG: dusk-wayland-v2
          JUCE_REV: 4d85afa175a45e0b5da11f9211de3ba88705588e
        run: |
          set -euo pipefail
          git init -q "${RUNNER_TEMP}/JUCE-wayland"
          cd "${RUNNER_TEMP}/JUCE-wayland"
          git remote add origin "${JUCE_MIRROR}"
          git fetch --depth 1 origin "refs/tags/${JUCE_TAG}"
          git checkout -q FETCH_HEAD
          [[ "$(git rev-parse HEAD)" == "${JUCE_REV}" ]] || {
            echo "ERROR: JUCE checkout $(git rev-parse HEAD) != pinned ${JUCE_REV}" >&2; exit 1; }
          grep -q "SIMDNativeOps<long long>" \
            modules/juce_dsp/native/juce_SIMDNativeOps_sse.h || {
            echo "ERROR: pinned JUCE missing the SIMDNativeOps<long long> alias." >&2; exit 1; }

      - name: Clone Dusk plugins (donor DSP, pinned)
        # Pinned to a specific donor SHA, mirroring the JUCE pin above. An
        # unpinned `git clone` of main HEAD makes old tags non-reproducible:
        # a later donor commit would silently change the DSP a past release
        # was built from. To move the donor forward, bump DONOR_REV.
        env:
          DONOR_REPO: https://github.com/dusk-audio/dusk-audio-plugins.git
          DONOR_REV: 69f04318e3b7063e382c80ac1cde2388170e668b
        run: |
          set -euo pipefail
          git init -q "${RUNNER_TEMP}/plugins-main"
          cd "${RUNNER_TEMP}/plugins-main"
          git remote add origin "${DONOR_REPO}"
          git fetch --depth 1 origin "${DONOR_REV}"
          git checkout -q "${DONOR_REV}"
          [[ "$(git rev-parse HEAD)" == "${DONOR_REV}" ]] || {
            echo "ERROR: donor checkout $(git rev-parse HEAD) != pinned ${DONOR_REV}" >&2; exit 1; }

      - name: Refresh Patreon supporters (best-effort)
        # Bakes the live supporters list into the release binary via
        # PatreonBackers.h (rewritten in the freshly-cloned plugins checkout
        # before configure). Best-effort: with no secrets, or on any API
        # failure, the build ships the committed list. The refresh token must be
        # reusable (Patreon creator tokens are); rotate the secret if invalidated.
        shell: bash
        env:
          PATREON_ACCESS_TOKEN: ${{ secrets.PATREON_ACCESS_TOKEN }}
          PATREON_REFRESH_TOKEN: ${{ secrets.PATREON_REFRESH_TOKEN }}
          PATREON_CLIENT_ID: ${{ secrets.PATREON_CLIENT_ID }}
          PATREON_CLIENT_SECRET: ${{ secrets.PATREON_CLIENT_SECRET }}
          DUSK_PLUGINS_PATH: ${{ runner.temp }}/plugins-main
        run: |
          if [ -z "${PATREON_REFRESH_TOKEN}" ] || [ -z "${PATREON_ACCESS_TOKEN}" ] \
             || [ -z "${PATREON_CLIENT_ID}" ] || [ -z "${PATREON_CLIENT_SECRET}" ]; then
            echo "::warning::Patreon secrets not configured - shipping the committed supporters list (may be stale)."
            exit 0
          fi
          umask 077
          mkdir -p "${HOME}/.config/dusk-audio"
          cfg="${HOME}/.config/dusk-audio/patreon.json"
          # Always remove the credential file on exit, even if a step below fails.
          trap 'rm -f "${cfg}"' EXIT
          # json.dump escapes any special characters in the secrets; a raw heredoc
          # would corrupt the JSON on a quote/backslash in a token.
          python3 -c 'import json, os, sys; json.dump({"access_token": os.environ["PATREON_ACCESS_TOKEN"], "refresh_token": os.environ["PATREON_REFRESH_TOKEN"], "client_id": os.environ["PATREON_CLIENT_ID"], "client_secret": os.environ["PATREON_CLIENT_SECRET"]}, open(sys.argv[1], "w"))' "${cfg}"
          # Secrets are configured, so this release must ship the live list.
          # Fail loud instead of falling back to the committed (possibly stale)
          # list. A blocked release beats a silently wrong one.
          if ! python3 scripts/update-patrons.py; then
            echo "::error::Patreon refresh failed despite configured secrets - refusing to ship a stale supporters list. Check the token/API and re-run."
            exit 1
          fi

      - name: Configure (Release)
        run: |
          cmake -S . -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_SKIP_FORK_CHECK=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE-wayland" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"

      - name: Build (Release)
        run: cmake --build build-linux -j

      - name: Build + run tests (release gate)
        # No artifact ships unless the full Catch2 suite passes.
        run: |
          cmake -S . -B build-tests -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUSKSTUDIO_BUILD_TESTS=ON \
            -DDUSKSTUDIO_SKIP_FORK_CHECK=ON \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE-wayland" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins-main"
          cmake --build build-tests --target dusk-studio-tests -j
          ctest --test-dir build-tests --output-on-failure

      - name: Package portable tarball
        # scripts/package-tarball.sh emits dusk-studio-<version>-Linux-<arch>.tar.xz
        # at the repo root (arch from uname -m, so the arm runner produces the
        # aarch64 tarball): a portable program directory (run ./DuskStudio/DuskStudio
        # in place) plus install.sh for optional menu / PATH / session-file-type
        # integration. Needs ImageMagick (icon downscale).
        run: BUILD_DIR=build-linux scripts/package-tarball.sh

      - name: Checksums
        run: |
          set -euo pipefail
          sha256sum dusk-studio-*-Linux-${{ matrix.arch }}.tar.xz \
            | tee "SHA256SUMS.linux-${{ matrix.arch }}"

      - name: Publish tarball to the PRIVATE releases repo
        # Only on a real v* tag — dispatch runs are build validation.
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch }}"
          NOTES="Unsigned Linux tarball: extract, then run ./DuskStudio/DuskStudio (or ./install.sh for a menu entry, dock/taskbar icon, PATH launcher, and session-file association - on Wayland the dock icon only appears after install.sh). The aarch64 build targets 64-bit Raspberry Pi OS (Pi 3/4/5)."

          shopt -s nullglob
          # Validate the TARBALL glob alone - a combined array would always carry
          # the SHA256SUMS literal, so its length is never zero even if the
          # packaging step produced no tarball.
          TARBALLS=( dusk-studio-*-Linux-${ARCH}.tar.xz )
          if [[ ${#TARBALLS[@]} -eq 0 ]]; then
            echo "::error::no Linux ${ARCH} tarball produced, packaging step failed" >&2
            exit 1
          fi
          ASSETS=( "${TARBALLS[@]}" "SHA256SUMS.linux-${ARCH}" )

          # The amd64 + arm64 matrix jobs publish to the SAME tag in parallel,
          # so the release may be absent when we look yet created by the sibling
          # a moment later. That race is benign; a real create failure (e.g. a
          # dead token) is NOT. Distinguish them: if `create` fails, re-check
          # existence - only a still-absent release is fatal, and we surface the
          # actual create error before exiting. Asset names carry the arch, so
          # the two jobs never overwrite each other's tarballs on upload.
          if ! gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            if ! create_err=$(gh release create "$TAG" \
              --repo "$RELEASES_REPO" \
              --title "Dusk Studio $TAG" \
              --notes "$NOTES" 2>&1); then
              if gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
                echo "release create raced with the sibling arch job; the release now exists, uploading."
              else
                echo "::error::gh release create failed for ${TAG} and no release exists:" >&2
                echo "${create_err}" >&2
                exit 1
              fi
            fi
          fi
          gh release upload "$TAG" --repo "$RELEASES_REPO" --clobber "${ASSETS[@]}"
          echo "Published ${#ASSETS[@]} ${ARCH} asset(s) to ${RELEASES_REPO} @ ${TAG}"
