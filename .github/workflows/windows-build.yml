name: Windows build

# Builds the WIX MSI installer and publishes it to the PRIVATE releases
# repo — NEVER as a public workflow artifact. On a public repo,
# actions/upload-artifact outputs are world-downloadable for ~90 days,
# which would give the paid build away; the DMG, MSI, and any future
# binary all route to dusk-audio/dusk-studio-releases (private) instead,
# matching macos-release.yml. The source stays open; the binaries are
# the product.
#
# Triggers:
#   - push of a v* tag  → publishes the MSI onto the SAME private release
#                          the mac DMG lands on (shared tag, distinct asset
#                          names), so one tag yields a cross-platform set.
#   - workflow_dispatch  → publishes a build-numbered pre-release for
#                          hand-offs to testers.
#
# The MSI is currently UNSIGNED (no Authenticode cert yet) — testers see a
# SmartScreen prompt. Statically linked CRT, so no vc_redist needed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + package (MSVC x64 Release, ASIO enabled)
    runs-on: windows-latest
    env:
      # PRIVATE releases repo — the MSI is pushed here, never to this
      # public repo. Same target as macos-release.yml.
      RELEASES_REPO: dusk-audio/dusk-studio-releases
      # H10: Authenticode signing secrets exported to the job env so
      # the per-step `if:` predicates can resolve at expression-layer
      # time. Empty on fork PRs / dispatch runs without the secret
      # configured — the package step's no-signing branch handles
      # that. SIGNING_CERT_BASE64 is the base64-encoded PFX; the
      # decode step writes it to a temp file on the runner. Never
      # expose the raw PFX in workspace storage.
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v4
        with:
          # external/sfizz is a submodule; without recursive checkout
          # the CMake configure step fails ("external/sfizz/src/sfizz.h
          # not found"). Nested sfizz deps (abseil, st_audiofile, etc)
          # also need to be present for the static link to succeed.
          submodules: recursive
          # Publish goes through RELEASES_REPO_TOKEN, not the persisted
          # GITHUB_TOKEN — don't leave it in git config.
          persist-credentials: false

      - name: Clone JUCE 8.0.4
        shell: bash
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git \
            "${RUNNER_TEMP}/JUCE"

      - name: Clone Dusk plugins (donor DSP)
        shell: bash
        run: |
          git clone --depth 1 \
            https://github.com/dusk-audio/dusk-audio-plugins.git \
            "${RUNNER_TEMP}/plugins"

      - name: Fetch Steinberg ASIO SDK
        shell: bash
        run: |
          # Steinberg distributes the ASIO SDK as a ZIP on a stable URL.
          # CMake looks at $ASIOSDK_PATH so we extract + export. The
          # vendor occasionally bumps version - if the URL 404s, update
          # the path here AND in the README.
          curl -sSL -o "${RUNNER_TEMP}/asiosdk.zip" https://download.steinberg.net/sdk_downloads/asiosdk_2.3.3_2019-06-14.zip
          7z x -y "${RUNNER_TEMP}/asiosdk.zip" -o"${RUNNER_TEMP}/asiosdk-extract" > /dev/null
          # ZIP wraps everything under asiosdk_2.3.3_2019-06-14/; explicitly
          # resolve the single inner directory and fail loud if zero or
          # multiple matches (otherwise a stale extract or a vendor
          # repackage would silently break ${ASIOSDK_PATH}/common).
          inner_dirs=("${RUNNER_TEMP}"/asiosdk-extract/asiosdk_*/)
          if (( ${#inner_dirs[@]} != 1 )) || [ ! -d "${inner_dirs[0]}" ]; then
              echo "ASIO SDK extract: expected exactly one asiosdk_* directory, got ${#inner_dirs[@]}" >&2
              ls -la "${RUNNER_TEMP}/asiosdk-extract" >&2 || true
              exit 1
          fi
          mv "${inner_dirs[0]}"/* "${RUNNER_TEMP}/asiosdk-extract/"
          rmdir "${inner_dirs[0]}" || true
          if [ ! -f "${RUNNER_TEMP}/asiosdk-extract/common/iasiodrv.h" ]; then
              echo "ASIO SDK extract: missing common/iasiodrv.h after move" >&2
              exit 1
          fi
          echo "ASIOSDK_PATH=${RUNNER_TEMP}/asiosdk-extract" >> "$GITHUB_ENV"

      - name: Configure (CMake / Visual Studio 17 2022 / x64)
        shell: bash
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins" \
            -DASIOSDK_PATH="${ASIOSDK_PATH}" \
            -DDUSKSTUDIO_ENABLE_LTO=ON

      - name: Build (Release)
        shell: bash
        run: cmake --build build --config Release -j

      - name: Decode signing certificate from base64 secret
        # H10: convert the SIGNING_CERT_BASE64 job-env secret (sourced
        # at the job level — see top of file) into a PFX file on the
        # runner's temp storage so signtool can consume it. No-op when
        # the secret is absent (forks, dispatch runs without the cert
        # configured) — the packaging step then falls through to an
        # unsigned MSI build, which still completes successfully and
        # surfaces a SmartScreen warning to testers.
        #
        # The temp path is exported via GITHUB_ENV so the packaging +
        # cleanup steps both see it without re-decoding. Writing under
        # $env:RUNNER_TEMP keeps the file off the workspace tree
        # (workspaces are checkpointed by some actions; RUNNER_TEMP is
        # always wiped at runner teardown).
        if: ${{ env.SIGNING_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "dusk-signing.pfx"
          [System.IO.File]::WriteAllBytes(
              $pfxPath,
              [System.Convert]::FromBase64String($env:SIGNING_CERT_BASE64))
          # Restrict ACL so any concurrent process on the runner can't
          # read the PFX while it's on disk. icacls returns 0 on
          # success; non-zero is non-fatal (signing still proceeds) so
          # the build doesn't die on a stricter runner image.
          icacls $pfxPath /inheritance:r /grant:r "$($env:USERNAME):(R)" | Out-Null
          "SIGNING_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Signing cert decoded to $pfxPath"

      - name: Set up WiX Toolset v3 (CPack -G WIX needs candle/light)
        # GitHub's windows runner image migration (windows-latest ->
        # windows-2025) dropped the pre-installed WiX 3 toolset that CPack's
        # WIX generator relies on. Without candle.exe / light.exe, cpack -G WIX
        # exits 0 but emits no .msi, and the SHA256 step then throws
        # "No MSI produced by cpack". Install WiX 3.x (the `wixtoolset` choco
        # package is the 3.x line; WiX 4+ ships as a separate dotnet tool and
        # is not compatible with CPack's WIX generator) and expose it to the
        # packaging step via the WIX env var (CPACK_WIX_ROOT defaults to it)
        # plus PATH.
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          if ($LASTEXITCODE -ne 0) { throw "WiX install failed (exit $LASTEXITCODE)" }
          $wixRoot = Get-ChildItem "C:\Program Files (x86)" -Directory -Filter "WiX Toolset v3.*" |
                     Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixRoot) { throw "WiX Toolset v3 not found after install" }
          $wixBin = Join-Path $wixRoot.FullName "bin"
          if (-not (Test-Path (Join-Path $wixBin "candle.exe"))) {
              throw "candle.exe missing in $wixBin"
          }
          # WIX env var must end in a backslash: CPack reads it as
          # CPACK_WIX_ROOT and appends "bin\candle.exe".
          "WIX=$($wixRoot.FullName)\" | Out-File -FilePath $env:GITHUB_ENV  -Append -Encoding utf8
          $wixBin                     | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "WiX ready: $wixBin"

      - name: Package MSI via CPack WIX (signs binaries + MSI when cert present)
        shell: pwsh
        # Delegates the cpack + signtool dance to the cross-platform
        # packaging script so local devs (cert in personal store) and
        # CI (cert decoded from base64 secret) share one signing path.
        # SIGNING_PFX_PATH is set by the prior step ONLY when the
        # SIGNING_CERT_BASE64 secret is present; the script's
        # "no-signing" branch handles the empty case gracefully.
        # SIGNING_CERT_PASSWORD comes from the job-level env block.
        run: |
          .\scripts\package-windows.ps1 `
              -BuildDir build `
              -SigningPfxPath ($env:SIGNING_PFX_PATH ?? "") `
              -SigningPfxPassword ($env:SIGNING_CERT_PASSWORD ?? "")
          if ($LASTEXITCODE -ne 0) { throw "package-windows.ps1 failed" }
          Get-ChildItem build\*.msi
          Get-ChildItem *.msi -ErrorAction SilentlyContinue

      - name: Wipe signing certificate from runner storage
        # H10: belt-and-braces secure-cleanup. The runner's RUNNER_TEMP
        # gets nuked at job end regardless, but GitHub Actions can
        # cache + replay logs on retry; overwriting the file with
        # zeros + then removing guarantees no signature material lingers
        # in a snapshot. `if: always()` runs on success AND failure
        # paths so a botched signing step still cleans up the cert.
        if: ${{ always() }}
        shell: pwsh
        run: |
          $pfx = $env:SIGNING_PFX_PATH
          if ($pfx -and (Test-Path $pfx)) {
              # Overwrite with zero bytes the size of the file to
              # ensure the bytes-on-disk don't survive in a journaled
              # filesystem free-list snapshot. Cheap (PFX is a few KB).
              $sz = (Get-Item $pfx).Length
              [System.IO.File]::WriteAllBytes($pfx, (New-Object byte[] $sz))
              Remove-Item $pfx -Force
              Write-Host "Signing cert wiped + removed: $pfx"
          } else {
              Write-Host "No signing cert to clean up (none was decoded)."
          }

      - name: Compute SHA256 of MSI(s)
        shell: pwsh
        # No working-directory: package-windows.ps1 moves the finished MSI and
        # writes SHA256SUMS.windows to the repo root (not build/), so operate
        # there. (This recomputes the sums the script already produced — same
        # format — which is harmless.)
        run: |
          # Cover every MSI cpack produced (cpack normally emits one, but
          # a future multi-component package or per-arch split could
          # produce more). SHA256SUMS.windows is named to not collide with
          # the mac SHA256SUMS.macos when both land on one release tag.
          if (Test-Path SHA256SUMS.windows) { Remove-Item SHA256SUMS.windows }
          $msis = Get-ChildItem *.msi
          if (-not $msis) { throw "No MSI produced by cpack" }
          foreach ($msi in $msis) {
            $hash = (Get-FileHash -Algorithm SHA256 $msi.FullName).Hash
            "$hash  $($msi.Name)" | Out-File -FilePath SHA256SUMS.windows -Encoding ascii -Append
            Write-Host "SHA256: $hash  $($msi.Name)"
          }

      - name: Publish MSI to the PRIVATE releases repo
        shell: bash
        # MSI + SHA256SUMS.windows live at the repo root after
        # package-windows.ps1 moves them there (not build/).
        # NOT actions/upload-artifact: on a public repo those artifacts
        # are world-downloadable, which would give the paid build away.
        # Push the MSI as a release asset in the private releases repo
        # only collaborators can read (gh is preinstalled on
        # windows-latest). A v* tag shares its release with the mac DMG;
        # asset names differ (*.msi / SHA256SUMS.windows vs *.dmg /
        # SHA256SUMS.macos) so they coexist under one tag.
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          # Tag: the pushed v* tag, else a VERSION-derived build tag for a
          # manual dispatch (run number keeps dispatch builds unique).
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            NOTES="Automated Windows build."
          else
            TAG="v$(tr -d '[:space:]' < ../VERSION)+build.${GITHUB_RUN_NUMBER}"
            NOTES="UNSIGNED Windows dev build (no Authenticode cert yet). SmartScreen may warn — choose More info -> Run anyway. Statically linked, no vc_redist needed. Not for sale until signed."
          fi

          shopt -s nullglob
          ASSETS=( *.msi SHA256SUMS.windows )
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::no MSI produced — packaging step failed" >&2
            exit 1
          fi

          # Create the release on first push of this tag, else just add
          # the assets (idempotent re-run). --clobber overwrites a same-
          # named asset from a previous attempt.
          if ! gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$RELEASES_REPO" \
              --title "Dusk Studio $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          else
            gh release upload "$TAG" --repo "$RELEASES_REPO" --clobber "${ASSETS[@]}"
          fi
          echo "Published ${#ASSETS[@]} asset(s) to ${RELEASES_REPO} @ ${TAG}"
