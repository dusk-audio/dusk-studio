name: Windows build

# Builds the WIX MSI installer and publishes it to the PRIVATE releases
# repo — NEVER as a public workflow artifact. On a public repo,
# actions/upload-artifact outputs are world-downloadable for ~90 days,
# which would give the paid build away; the DMG, MSI, and any future
# binary all route to dusk-audio/dusk-studio-releases (private) instead,
# matching macos-release.yml. The source stays open; the binaries are
# the product.
#
# Triggers:
#   - push of a v* tag  → publishes the MSI onto the SAME private release
#                          the mac DMG lands on (shared tag, distinct asset
#                          names), so one tag yields a cross-platform set.
#   - workflow_dispatch  → publishes a build-numbered pre-release for
#                          hand-offs to testers.
#
# The MSI is currently UNSIGNED (no Authenticode cert yet) — testers see a
# SmartScreen prompt. Statically linked CRT, so no vc_redist needed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + package (MSVC x64 Release, ASIO enabled)
    runs-on: windows-latest
    env:
      # PRIVATE releases repo — the MSI is pushed here, never to this
      # public repo. Same target as macos-release.yml.
      RELEASES_REPO: dusk-audio/dusk-studio-releases

    steps:
      - name: Checkout Dusk Studio
        uses: actions/checkout@v4
        with:
          # external/sfizz is a submodule; without recursive checkout
          # the CMake configure step fails ("external/sfizz/src/sfizz.h
          # not found"). Nested sfizz deps (abseil, st_audiofile, etc)
          # also need to be present for the static link to succeed.
          submodules: recursive
          # Publish goes through RELEASES_REPO_TOKEN, not the persisted
          # GITHUB_TOKEN — don't leave it in git config.
          persist-credentials: false

      - name: Clone JUCE 8.0.4
        shell: bash
        run: |
          git clone --depth 1 --branch 8.0.4 \
            https://github.com/juce-framework/JUCE.git \
            "${RUNNER_TEMP}/JUCE"

      - name: Clone Dusk plugins (donor DSP)
        shell: bash
        run: |
          git clone --depth 1 \
            https://github.com/dusk-audio/dusk-audio-plugins.git \
            "${RUNNER_TEMP}/plugins"

      - name: Fetch Steinberg ASIO SDK
        shell: bash
        run: |
          # Steinberg distributes the ASIO SDK as a ZIP on a stable URL.
          # CMake looks at $ASIOSDK_PATH so we extract + export. The
          # vendor occasionally bumps version - if the URL 404s, update
          # the path here AND in the README.
          curl -sSL -o "${RUNNER_TEMP}/asiosdk.zip" https://download.steinberg.net/sdk_downloads/asiosdk_2.3.3_2019-06-14.zip
          7z x -y "${RUNNER_TEMP}/asiosdk.zip" -o"${RUNNER_TEMP}/asiosdk-extract" > /dev/null
          # ZIP wraps everything under asiosdk_2.3.3_2019-06-14/; explicitly
          # resolve the single inner directory and fail loud if zero or
          # multiple matches (otherwise a stale extract or a vendor
          # repackage would silently break ${ASIOSDK_PATH}/common).
          inner_dirs=("${RUNNER_TEMP}"/asiosdk-extract/asiosdk_*/)
          if (( ${#inner_dirs[@]} != 1 )) || [ ! -d "${inner_dirs[0]}" ]; then
              echo "ASIO SDK extract: expected exactly one asiosdk_* directory, got ${#inner_dirs[@]}" >&2
              ls -la "${RUNNER_TEMP}/asiosdk-extract" >&2 || true
              exit 1
          fi
          mv "${inner_dirs[0]}"/* "${RUNNER_TEMP}/asiosdk-extract/"
          rmdir "${inner_dirs[0]}" || true
          if [ ! -f "${RUNNER_TEMP}/asiosdk-extract/common/iasiodrv.h" ]; then
              echo "ASIO SDK extract: missing common/iasiodrv.h after move" >&2
              exit 1
          fi
          echo "ASIOSDK_PATH=${RUNNER_TEMP}/asiosdk-extract" >> "$GITHUB_ENV"

      - name: Configure (CMake / Visual Studio 17 2022 / x64)
        shell: bash
        run: |
          cmake -S . -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DJUCE_PATH="${RUNNER_TEMP}/JUCE" \
            -DDUSK_PLUGINS_PATH="${RUNNER_TEMP}/plugins" \
            -DASIOSDK_PATH="${ASIOSDK_PATH}" \
            -DDUSKSTUDIO_ENABLE_LTO=ON

      - name: Build (Release)
        shell: bash
        run: cmake --build build --config Release -j

      - name: Package MSI via CPack WIX
        shell: pwsh
        working-directory: build
        run: |
          # WIX Toolset is preinstalled on windows-latest. cpack -G WIX
          # reads CPACK_WIX_* settings from CMakeLists.txt to produce a
          # standalone installer that bundles the MSVC runtime so the
          # tester doesn't need a separate vc_redist.exe.
          cpack -G WIX -C Release
          if ($LASTEXITCODE -ne 0) { throw "cpack failed" }
          Get-ChildItem *.msi

      - name: Compute SHA256 of MSI(s)
        shell: pwsh
        working-directory: build
        run: |
          # Cover every MSI cpack produced (cpack normally emits one, but
          # a future multi-component package or per-arch split could
          # produce more). SHA256SUMS.windows is named to not collide with
          # the mac SHA256SUMS.macos when both land on one release tag.
          if (Test-Path SHA256SUMS.windows) { Remove-Item SHA256SUMS.windows }
          $msis = Get-ChildItem *.msi
          if (-not $msis) { throw "No MSI produced by cpack" }
          foreach ($msi in $msis) {
            $hash = (Get-FileHash -Algorithm SHA256 $msi.FullName).Hash
            "$hash  $($msi.Name)" | Out-File -FilePath SHA256SUMS.windows -Encoding ascii -Append
            Write-Host "SHA256: $hash  $($msi.Name)"
          }

      - name: Publish MSI to the PRIVATE releases repo
        shell: bash
        working-directory: build
        # NOT actions/upload-artifact: on a public repo those artifacts
        # are world-downloadable, which would give the paid build away.
        # Push the MSI as a release asset in the private releases repo
        # only collaborators can read (gh is preinstalled on
        # windows-latest). A v* tag shares its release with the mac DMG;
        # asset names differ (*.msi / SHA256SUMS.windows vs *.dmg /
        # SHA256SUMS.macos) so they coexist under one tag.
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          set -euo pipefail
          # Tag: the pushed v* tag, else a VERSION-derived build tag for a
          # manual dispatch (run number keeps dispatch builds unique).
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            NOTES="Automated Windows build."
          else
            TAG="v$(tr -d '[:space:]' < ../VERSION)+build.${GITHUB_RUN_NUMBER}"
            NOTES="UNSIGNED Windows dev build (no Authenticode cert yet). SmartScreen may warn — choose More info -> Run anyway. Statically linked, no vc_redist needed. Not for sale until signed."
          fi

          shopt -s nullglob
          ASSETS=( *.msi SHA256SUMS.windows )
          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "::error::no MSI produced — packaging step failed" >&2
            exit 1
          fi

          # Create the release on first push of this tag, else just add
          # the assets (idempotent re-run). --clobber overwrites a same-
          # named asset from a previous attempt.
          if ! gh release view "$TAG" --repo "$RELEASES_REPO" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$RELEASES_REPO" \
              --title "Dusk Studio $TAG" \
              --notes "$NOTES" \
              "${ASSETS[@]}"
          else
            gh release upload "$TAG" --repo "$RELEASES_REPO" --clobber "${ASSETS[@]}"
          fi
          echo "Published ${#ASSETS[@]} asset(s) to ${RELEASES_REPO} @ ${TAG}"
